<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自由都市 - 状态栏</title>
</head>
<body>
<div class="panel">
<!-- 头部信息栏 -->
<div class="header">
<div class="header-l">
<span class="time"><span id="h-date">----</span> | <span id="h-time">--:--</span></span>
<span class="loc">📍 <span id="h-loc">未知</span></span>
</div>
<div class="header-r">
<div style="position:relative">
<button class="theme-btn" id="theme-toggle">🎨 主题</button>
<div class="theme-panel" id="theme-panel">
<div class="theme-section">
<div class="theme-section-title">预设主题</div>
<div class="theme-presets">
<div class="theme-preset active" data-t="blue" title="蓝色(默认)"></div>
<div class="theme-preset" data-t="green" title="绿色"></div>
<div class="theme-preset" data-t="purple" title="紫色"></div>
<div class="theme-preset" data-t="orange" title="橙色"></div>
<div class="theme-preset" data-t="red" title="红色"></div>
<div class="theme-preset" data-t="cyan" title="青色"></div>
</div>
</div>
<div class="theme-section">
<div class="theme-section-title">自定义颜色</div>
<div class="custom-color-row">
<input type="color" class="custom-color-input" id="custom-color" value="#4a90e2">
<input type="text" class="custom-color-hex" id="custom-hex" value="#4a90e2" maxlength="7">
<button class="custom-apply-btn" id="custom-apply">应用</button>
</div>
</div>
<div class="theme-section">
<div class="theme-section-title">字号大小</div>
<div class="font-size-row">
<input type="range" class="font-size-slider" id="font-size-slider" min="0.8" max="1.5" step="0.1" value="1">
<div class="font-size-display">
<span id="font-size-value">100%</span>
<button class="font-size-reset" id="font-size-reset">重置</button>
</div>
</div>
</div>
</div>
</div>
</div>
</div>

<!-- 主体布局：左侧Tab，右侧内容 -->
<div class="main-layout">
  <!-- Tab导航栏（左侧纵向） -->
  <div class="tabs">
    <button class="tab active" data-t="world">🌍 世界</button>
    <button class="tab" data-t="player">👤 玩家</button>
    <button class="tab" data-t="character">👥 角色</button>
    <button class="tab" data-t="items">📦 物品</button>
    <button class="tab" data-t="memo">📝 备忘录</button>
  </div>

  <!-- 内容区域（右侧） -->
  <div class="content">
<!-- Tab1: 世界 -->
<div class="pnl active" id="p-world">
<div class="sec"><div class="sec-title">🌍 世界名称</div>
<div class="item"><div class="val" id="world-name">--</div></div>
</div>
<div class="sec"><div class="sec-title">📖 世界信息</div>
<div class="grid g2">
<div class="item"><div class="lbl">当前时间</div><div class="val" id="world-time">--</div></div>
<div class="item"><div class="lbl">当前位置</div><div class="val" id="world-location">--</div></div>
<div class="item"><div class="lbl">时代背景</div><div class="val" id="world-era">--</div></div>
<div class="item"><div class="lbl">世界概述</div><div class="val" id="world-summary">--</div></div>
</div>
</div>
<div class="sec"><div class="sec-title">🧭 曾经探访过的世界</div>
<div id="world-visited"></div>
</div>
</div>

<!-- Tab2: 玩家 -->
<div class="pnl" id="p-player">
<!-- 内容将通过JS动态生成，包含所有折叠项 -->
</div>

<!-- Tab3: 角色 -->
<div class="pnl" id="p-character">
<div class="character-selector" id="character-selector">
<!-- 角色列表 -->
</div>
<div id="character-detail-container">
<!-- 选中的角色详情 -->
</div>
</div>


<!-- Tab12: 物品 -->
<div class="pnl" id="p-items">
<div id="items-list"></div>
</div>

<!-- Tab13: 备忘录 -->
<div class="pnl" id="p-memo">
  <div class="sec"><div class="sec-title">📝 备忘录</div>
    <div class="memo-container">
      <div class="memo-section">
        <div class="memo-title">📌 重要事项</div>
        <div id="memo-important-full"></div>
      </div>
      <div class="memo-section">
        <div class="memo-title">✅ 待处理事件</div>
        <div id="memo-pending-full"></div>
      </div>
      <div class="memo-section">
        <div class="memo-title">📅 日程表</div>
        <div id="memo-schedule-full"></div>
      </div>
    </div>
  </div>
</div>
</div> <!-- /content -->
</div> <!-- /main-layout -->

</body>
